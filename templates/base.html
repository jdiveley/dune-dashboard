<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dune Awakening Server Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="brand">DUNE DASHBOARD</div>
        {% for href, label in nav_pages %}
        <a href="{{ href }}" class="{% if current_path == href %}active{% endif %}">{{ label }}</a>
        {% endfor %}
        <div class="spacer"></div>
        <span style="font-size:12px;color:var(--nav-text);display:flex;align-items:center;">
            <span class="conn-dot {% if conn_ok %}online{% else %}offline{% endif %}"></span>
            {{ 'Connected' if conn_ok else 'Disconnected' }}
        </span>
        {% if current_user and current_user.is_authenticated %}
        <a href="/logout" style="font-size:12px;color:var(--nav-text);">Logout</a>
        {% endif %}
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
