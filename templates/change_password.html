{% extends "base.html" %}
{% block title %}Change Password - Dune Dashboard{% endblock %}
{% block content %}
<div style="max-width:420px;margin:4rem auto;">
    <h2 style="color:var(--accent);margin-bottom:1.5rem;">Change Password</h2>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <div style="padding:0.75rem;border-radius:4px;margin-bottom:1rem;font-size:0.9rem;
        {% if 'successfully' in message %}
            background:rgba(46,204,113,0.1);border:1px solid #2ecc71;color:#2ecc71;
        {% else %}
            background:rgba(231,76,60,0.1);border:1px solid var(--danger);color:var(--danger);
        {% endif %}
    ">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:1.5rem;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div style="margin-bottom:1rem;">
            <label style="display:block;margin-bottom:0.4rem;font-size:0.9rem;color:var(--text-muted);">Current Password</label>
            <input type="password" name="current_password" required autofocus
                style="width:100%;padding:0.7rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:1rem;">
        </div>
        <div style="margin-bottom:1rem;">
            <label style="display:block;margin-bottom:0.4rem;font-size:0.9rem;color:var(--text-muted);">New Password</label>
            <input type="password" name="new_password" required minlength="8"
                style="width:100%;padding:0.7rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:1rem;">
        </div>
        <div style="margin-bottom:1.5rem;">
            <label style="display:block;margin-bottom:0.4rem;font-size:0.9rem;color:var(--text-muted);">Confirm New Password</label>
            <input type="password" name="confirm_password" required minlength="8"
                style="width:100%;padding:0.7rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:1rem;">
        </div>
        <button type="submit"
            style="width:100%;padding:0.75rem;background:var(--accent);color:#000;border:none;border-radius:4px;font-size:1rem;font-weight:600;cursor:pointer;">
            Update Password
        </button>
    </form>
</div>
{% endblock %}
